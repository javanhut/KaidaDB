syntax = "proto3";

package kaidadb;

service KaidaDB {
    // Store media via client-streaming upload
    rpc StoreMedia(stream StoreMediaRequest) returns (StoreMediaResponse);

    // Stream media back via server-streaming download
    rpc StreamMedia(StreamMediaRequest) returns (stream MediaChunk);

    // Get media metadata
    rpc GetMediaMeta(GetMediaMetaRequest) returns (MediaMetadata);

    // Delete media
    rpc DeleteMedia(DeleteMediaRequest) returns (DeleteMediaResponse);

    // List media keys
    rpc ListMedia(ListMediaRequest) returns (ListMediaResponse);

    // Rename (move) media to a new key
    rpc RenameMedia(RenameMediaRequest) returns (RenameMediaResponse);

    // Health check
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

    // Streaming playlist generation
    rpc GetHlsMasterPlaylist(GetPlaylistRequest) returns (PlaylistResponse);
    rpc GetHlsMediaPlaylist(GetVariantPlaylistRequest) returns (PlaylistResponse);
    rpc GetDashManifest(GetPlaylistRequest) returns (PlaylistResponse);
    rpc ListStreams(ListStreamsRequest) returns (ListStreamsResponse);
    rpc DeleteStream(DeleteStreamRequest) returns (DeleteStreamResponse);
}

message StoreMediaRequest {
    oneof request {
        StoreMediaHeader header = 1;
        bytes chunk_data = 2;
    }
}

message StoreMediaHeader {
    string key = 1;
    string content_type = 2;
    map<string, string> metadata = 3;
}

message StoreMediaResponse {
    string key = 1;
    uint64 total_size = 2;
    uint32 chunk_count = 3;
    string checksum = 4;
}

message StreamMediaRequest {
    string key = 1;
    uint64 offset = 2;   // byte offset to start from
    uint64 length = 3;   // 0 = stream to end
}

message MediaChunk {
    uint32 sequence = 1;
    bytes data = 2;
    uint64 offset = 3;
    bool is_last = 4;
}

message GetMediaMetaRequest {
    string key = 1;
}

message MediaMetadata {
    string key = 1;
    uint64 total_size = 2;
    uint32 chunk_count = 3;
    string content_type = 4;
    string checksum = 5;
    map<string, string> metadata = 6;
    int64 created_at = 7;
    int64 updated_at = 8;
}

message DeleteMediaRequest {
    string key = 1;
}

message DeleteMediaResponse {
    bool deleted = 1;
}

message ListMediaRequest {
    string prefix = 1;
    uint32 limit = 2;
    string cursor = 3;
}

message ListMediaResponse {
    repeated MediaMetadata items = 1;
    string next_cursor = 2;
}

message RenameMediaRequest {
    string from_key = 1;
    string to_key = 2;
}

message RenameMediaResponse {
    string key = 1;
    uint64 total_size = 2;
    string content_type = 3;
}

message HealthCheckRequest {}

message HealthCheckResponse {
    string status = 1;
    string version = 2;
    uint64 uptime_seconds = 3;
}

// ─── Streaming playlist messages ────────────────────────────────────────────

message GetPlaylistRequest {
    string stream_id = 1;
}

message GetVariantPlaylistRequest {
    string stream_id = 1;
    string variant_id = 2;
}

message PlaylistResponse {
    string content_type = 1;
    string body = 2;
}

message ListStreamsRequest {
    string prefix = 1;
    uint32 limit = 2;
    string cursor = 3;
}

message StreamInfo {
    string stream_id = 1;
    repeated VariantInfoProto variants = 2;
    int64 created_at = 3;
}

message VariantInfoProto {
    string variant_id = 1;
    uint32 segment_count = 2;
    uint64 bandwidth = 3;
    uint32 width = 4;
    uint32 height = 5;
    string codec = 6;
    string media_type = 7;
}

message ListStreamsResponse {
    repeated StreamInfo streams = 1;
    string next_cursor = 2;
}

message DeleteStreamRequest {
    string stream_id = 1;
}

message DeleteStreamResponse {
    uint32 variants_deleted = 1;
    uint32 segments_deleted = 2;
}
